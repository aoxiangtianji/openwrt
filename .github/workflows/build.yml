name: Build OpenWrt Packages

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          # 编译 23.05 稳定版以获取 .ipk 文件
          - arch: x86_64_ipk
            sdk_url: https://downloads.openwrt.org/releases/23.05.4/targets/x86/64/openwrt-sdk-23.05.4-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          - arch: aarch64_ipk
            sdk_url: https://downloads.openwrt.org/releases/23.05.4/targets/armsr/armv8/openwrt-sdk-23.05.4-armsr-armv8_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          # 编译 Snapshot 快照版以获取 .apk 文件
          - arch: x86_64_apk
            sdk_url: https://downloads.openwrt.org/snapshots/targets/x86/64/openwrt-sdk-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst
          - arch: aarch64_apk
            sdk_url: https://downloads.openwrt.org/snapshots/targets/armsr/armv8/openwrt-sdk-armsr-armv8_gcc-14.3.0_musl.Linux-x86_64.tar.zst

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl, aarch64-unknown-linux-musl

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3-distutils rsync unzip zlib1g-dev file wget zstd \
            cmake ninja-build pkg-config curl

      - name: Download and Extract SDK
        run: |
          FILENAME=$(basename "${{ matrix.sdk_url }}")
          wget -O "$FILENAME" "${{ matrix.sdk_url }}"
          mkdir sdk
          tar -xf "$FILENAME" -C sdk --strip-components=1
          cd sdk
          cp feeds.conf.default feeds.conf
          echo "src-link customfeed ${{ github.workspace }}" >> feeds.conf
          # 仅更新 feeds 列表，去掉 install -a 以大幅节省时间
          ./scripts/feeds update -a

      - name: Cache Toolchain and DL
        uses: actions/cache@v4
        with:
          path: |
            sdk/staging_dir/host*
            sdk/dl
          key: openwrt-sdk-${{ matrix.arch }}-${{ hashFiles('**/Makefile') }}
          restore-keys: |
            openwrt-sdk-${{ matrix.arch }}-

      - name: Check Existing Releases and Compile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd ${{ github.workspace }}
          # 找出所有包含 Makefile 的包目录（排除下载的 sdk 和生成的 artifacts 目录）
          PKGS=$(find . -mindepth 2 -maxdepth 2 -name Makefile | awk -F/ '{print $2}' | grep -vE '^(sdk|artifacts)$')
          FORMAT=$(echo "${{ matrix.arch }}" | awk -F_ '{print $NF}')

          # 获取 latest 版本的 Release 中已有的文件
          LATEST_ASSETS=$(gh release view latest --json assets --jq '.assets[].name' 2>/dev/null || echo "")

          cd sdk
          make defconfig

          # 绕过 OpenWrt 的 rust/host 漫长编译
          echo "Bypassing OpenWrt rust/host build..."
          mkdir -p staging_dir/host/bin
          ln -sf $(which cargo) staging_dir/host/bin/cargo
          ln -sf $(which rustc) staging_dir/host/bin/rustc
          touch staging_dir/host/bin/rustdoc

          for pkg in $PKGS; do
            # 检查格式为 `架构前缀~包名` 的文件是否已在 Release 中
            if echo "$LATEST_ASSETS" | grep -q "^${{ matrix.arch }}~${pkg}[_-].*\.${FORMAT}$"; then
              echo "✅ [$pkg] ($FORMAT) 已是最新，跳过编译。"
            else
              echo "🚀 [$pkg] 开始编译 ($FORMAT)..."
              # 仅移除对 rust/host 的依赖，不影响 C/Go 也不破坏常规 DEPENDS
              sed -i 's/rust\/host//g' ../$pkg/Makefile 2>/dev/null || true

              ./scripts/feeds install $pkg
              make package/$pkg/compile V=s -j$(nproc)
            fi
          done

      - name: Collect IPK/APK files
        id: collect
        run: |
          mkdir -p artifacts sdk/bin/packages

          # 收集并重命名以防止 apk 文件在 release 中互相覆盖
          find sdk/bin/packages -type f \( -name "*.ipk" -o -name "*.apk" \) | while read file; do
            filename=$(basename "$file")
            cp "$file" "artifacts/${{ matrix.arch }}~${filename}"
          done

          if [ -d artifacts ] && [ "$(ls -A artifacts)" ]; then
            echo "has_artifacts=true" >> $GITHUB_OUTPUT
            ls -la artifacts/
          else
            echo "has_artifacts=false" >> $GITHUB_OUTPUT
            echo "没有新的包产生。"
          fi

      - name: Delete Old Assets
        if: steps.collect.outputs.has_artifacts == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd ${{ github.workspace }}

          for file in artifacts/*; do
            filename=$(basename "$file")
            # 提取包的原始名称前缀，例如 x86_64_apk~haut-auth-0.2.2-r1.apk -> haut-auth
            real_name=$(echo "$filename" | cut -d'~' -f2-)
            pkg_prefix=$(echo "$real_name" | sed -E 's/(_|-)[0-9].*//')

            OLD_ASSETS=$(gh release view latest --json assets --jq '.assets[].name' 2>/dev/null | grep "^${{ matrix.arch }}~${pkg_prefix}" || true)
            for old in $OLD_ASSETS; do
              if [ "$old" != "$filename" ]; then
                echo "🗑️ 删除旧版本: $old"
                gh release delete-asset latest "$old" -y || true
              fi
            done
          done

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        if: steps.collect.outputs.has_artifacts == 'true'
        with:
          name: Latest Packages
          tag_name: latest
          files: artifacts/*
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
