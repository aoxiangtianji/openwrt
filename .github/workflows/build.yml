name: Build OpenWrt Packages

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          # 编译 23.05 稳定版以获取 .ipk 文件
          - arch: x86_64_ipk
            sdk_url: https://downloads.openwrt.org/releases/23.05.4/targets/x86/64/openwrt-sdk-23.05.4-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          - arch: aarch64_ipk
            sdk_url: https://downloads.openwrt.org/releases/23.05.4/targets/armsr/armv8/openwrt-sdk-23.05.4-armsr-armv8_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          # 编译 Snapshot 快照版以获取 .apk 文件
          - arch: x86_64_apk
            sdk_url: https://downloads.openwrt.org/snapshots/targets/x86/64/openwrt-sdk-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.xz
          - arch: aarch64_apk
            sdk_url: https://downloads.openwrt.org/snapshots/targets/armsr/armv8/openwrt-sdk-armsr-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.xz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3-distutils rsync unzip zlib1g-dev file wget

      - name: Download and Extract SDK
        run: |
          wget -O sdk.tar.xz "${{ matrix.sdk_url }}"
          mkdir sdk
          tar -xf sdk.tar.xz -C sdk --strip-components=1
          cd sdk
          cp feeds.conf.default feeds.conf
          echo "src-link customfeed ${{ github.workspace }}" >> feeds.conf
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Cache Toolchain and DL
        uses: actions/cache@v4
        with:
          path: |
            sdk/staging_dir/host*
            sdk/dl
          key: openwrt-sdk-${{ matrix.arch }}-${{ hashFiles('**/Makefile') }}
          restore-keys: |
            openwrt-sdk-${{ matrix.arch }}-

      - name: Check Existing Releases and Compile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd ${{ github.workspace }}
          PKGS=$(find . -mindepth 2 -maxdepth 2 -name Makefile | awk -F/ '{print $2}')
          FORMAT=$(echo "${{ matrix.arch }}" | awk -F_ '{print $NF}')

          # 尝试获取 latest 版本的 Release 中已有的文件，如果 Release 不存在则为空
          LATEST_ASSETS=$(gh release view latest --json assets --jq '.assets[].name' 2>/dev/null || echo "")

          cd sdk
          make defconfig

          for pkg in $PKGS; do
            VERSION=$(grep '^PKG_VERSION:=' ../$pkg/Makefile | cut -d '=' -f 2 | tr -d ' \r\n')
            RELEASE=$(grep '^PKG_RELEASE:=' ../$pkg/Makefile | cut -d '=' -f 2 | tr -d ' \r\n')

            # 检查格式为 `包名_版本-发布号_架构.扩展名` 的文件是否已在 Release 中
            if echo "$LATEST_ASSETS" | grep -q "^${pkg}_${VERSION}-${RELEASE}_.*\.${FORMAT}$"; then
              echo "✅ [$pkg] v${VERSION}-${RELEASE} ($FORMAT) 已是最新，跳过编译。"
            else
              echo "🚀 [$pkg] 开始编译 v${VERSION}-${RELEASE} ($FORMAT)..."
              ./scripts/feeds install $pkg
              make package/$pkg/compile V=s -j$(nproc)
            fi
          done

      - name: Collect IPK/APK files
        id: collect
        run: |
          mkdir -p artifacts
          find sdk/bin/packages -type f \( -name "*.ipk" -o -name "*.apk" \) -exec cp {} artifacts/ \;

          if [ -d artifacts ] && [ "$(ls -A artifacts)" ]; then
            echo "has_artifacts=true" >> $GITHUB_OUTPUT
            ls -la artifacts/
          else
            echo "has_artifacts=false" >> $GITHUB_OUTPUT
            echo "没有新的包产生。"
          fi

      - name: Delete Old Assets
        if: steps.collect.outputs.has_artifacts == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd ${{ github.workspace }}
          FORMAT=$(echo "${{ matrix.arch }}" | awk -F_ '{print $NF}')

          for file in artifacts/*; do
            filename=$(basename "$file")
            pkgname=$(echo "$filename" | cut -d'_' -f1)

            # 在最新 release 中找出该包的旧版本并删除（排除刚才编译好的最新文件名）
            OLD_ASSETS=$(gh release view latest --json assets --jq '.assets[].name' 2>/dev/null | grep "^${pkgname}_" | grep "\.${FORMAT}$" || true)
            for old in $OLD_ASSETS; do
              if [ "$old" != "$filename" ]; then
                echo "🗑️ 删除旧版本: $old"
                gh release delete-asset latest "$old" -y || true
              fi
            done
          done

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        if: steps.collect.outputs.has_artifacts == 'true'
        with:
          name: Latest Packages
          tag_name: latest
          files: artifacts/*
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
